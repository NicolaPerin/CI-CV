cv:
  sections:
    Profile:
      - >
        MSc graduate in Data Science and Scientific Computing with hands-on experience in data engineering
        and FAIR-oriented research data workflows. Worked on the development of a containerised web platform
        integrated with distributed storage (Ceph/S3) and deployed in a Kubernetes environment within an
        HPC data center context. Physics graduate with experience analysing Fermi-LAT gamma-ray data,
        providing familiarity with space mission data products and scientific archive workflows.

    Experience:

      - company: Area Science Park
        position: Research Fellow
        start_date: 2025-06
        end_date:
        location: Trieste
        highlights:
          - Served as the link between data center operations team and electron microscopy researchers to design and deploy a FAIR-aligned data management platform, 
            implementing workflows that extract and normalize microscope metadata into the NeXus (HDF5) NXem schema for archival integration and reuse.
          - Integrated S3-compatible storage (Ceph RGW) and OIDC authentication (Authentik) into a containerized Django app deployed on Kubernetes 
            in a virtualized replica of the production HPC staging environment, following TDD and CI/CD practices.

      - company: Area Science Park
        position: Curricular Internship
        start_date: 2024-03
        end_date: 2024-07
        location: Trieste
        highlights:
          - Built containerized (Podman) environments with automated fio I/O benchmarks, executed via shell scripts and Jenkins CI across multiple 
            Fedora setups to ensure reproducible cross-platform results.
          - Analysed benchmark results in a Jupyter notebook (IOPS, bandwidth, CPU utilisation, latency);
            wrote a Lua module for fio to enable loading it as an environment module on the HPC cluster.

